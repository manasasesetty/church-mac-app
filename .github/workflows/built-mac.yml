name: Build Mac DMG

on:
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build DMG
        run: npx electron-builder --mac dmg --publish never

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: church-mac-dmg
          path: dist/*.dmg